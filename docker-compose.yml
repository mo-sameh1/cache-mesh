services:
  name-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    profiles:
      - name-service
    command: uvicorn services.name_service.main:app --host 0.0.0.0 --port ${NAME_SERVICE_PORT:-8100}
    environment:
      NAME_SERVICE_HOST: 0.0.0.0
      NAME_SERVICE_PORT: ${NAME_SERVICE_PORT:-8100}
    ports:
      - "${NAME_SERVICE_PORT:-8100}:${NAME_SERVICE_PORT:-8100}"
    restart: unless-stopped

  replica:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    profiles:
      - replica
    command: uvicorn services.replica.main:app --host 0.0.0.0 --port ${REPLICA_PORT:-8201}
    environment:
      REPLICA_HOST: 0.0.0.0
      REPLICA_PORT: ${REPLICA_PORT:-8201}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      HF_TOKEN: ${HF_TOKEN:-}
      SENTENCE_TRANSFORMERS_HOME: /root/.cache/sentence-transformers
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    ports:
      - "${REPLICA_PORT:-8201}:${REPLICA_PORT:-8201}"
    volumes:
      - ./.docker/huggingface:/root/.cache/huggingface
      - ./.docker/sentence-transformers:/root/.cache/sentence-transformers
    depends_on:
      - qdrant
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    profiles:
      - gateway
    command: uvicorn services.gateway.main:app --host 0.0.0.0 --port ${GATEWAY_PORT:-8000}
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: ${GATEWAY_PORT:-8000}
    ports:
      - "${GATEWAY_PORT:-8000}:${GATEWAY_PORT:-8000}"
    restart: unless-stopped

  inference-adapter:
    build:
      context: .
      dockerfile: Dockerfile.inference
    env_file:
      - .env
    profiles:
      - inference
    command: uvicorn services.inference_adapter.main:app --host 0.0.0.0 --port ${ADAPTER_PORT:-8050}
    environment:
      ADAPTER_HOST: 0.0.0.0
      ADAPTER_PORT: ${ADAPTER_PORT:-8050}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    ports:
      - "${ADAPTER_PORT:-8050}:${ADAPTER_PORT:-8050}"
    volumes:
      - ./.docker/huggingface:/root/.cache/huggingface
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    profiles:
      - replica
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
    volumes:
      - ./.docker/qdrant:/qdrant/storage
    restart: unless-stopped
